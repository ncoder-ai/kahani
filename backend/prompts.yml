# =============================================================================
# ENTITY STATE EXTRACTION PROMPTS
# =============================================================================
entity_state_extraction:
  # Single scene extraction (used by entity_state_service.py main LLM fallback)
  single:
    system: |
      You are a precise story analysis assistant. Extract entity state changes and return only valid JSON.
      Focus on quality over quantity - extract only truly significant entities and states.
    
    user: |
      Analyze this story scene and extract entity state changes.
      
      Scene (Sequence #{scene_sequence}):
      {scene_content}
      
      Known Characters: {character_names}
      
      Extract the following as JSON:
      1. Character state changes (location, emotional state, current attire, possessions, knowledge, relationships)
      2. Location information (name, condition, atmosphere, occupants)
      3. Important objects (name, location, owner, condition)
      
      CRITICAL INSTRUCTIONS FOR CHARACTER STATE EXTRACTION:
      All character descriptions MUST be:
      - FACTUAL: Only what is explicitly stated or directly observable in the text
      - CONCISE: 1-5 words for states (e.g., "angry", "wounded", "exhausted")
      - OBJECTIVE: No interpretations, symbolism, or inferred meanings
      
      For "location": Use room/building names (e.g., "bedroom", "kitchen", "Blackwood Manor")
        * GOOD: "bedroom", "kitchen", "forest clearing"
        * BAD: "next to the bed", "by the window", "at the table"
      
      For "emotional_state": Single words or short phrases only
        * GOOD: "angry", "sad", "determined", "confused"
        * BAD: "feeling a complex mix of emotions about recent events"
      
      For "physical_condition": Concise observable states only
        * GOOD: "wounded", "exhausted", "healthy"
        * BAD: "appears to be in good health based on his actions"
      
      For "current_attire": Extract ONLY what is explicitly mentioned in the scene text
        * GOOD: "wearing a torn red jacket", "shirtless", "in uniform"
        * BAD: "dressed in standard field gear" (if not explicitly stated)
        * Use null if no clothing is mentioned
      
      CRITICAL INSTRUCTIONS FOR LOCATION EXTRACTION:
      ONLY extract locations that are:
      - Rooms (bedroom, kitchen, living room, office, bathroom)
      - Buildings (house, castle, tower, shop, barn)
      - Outdoor areas (forest, courtyard, street, park, field)
      - Named places (Blackwood Manor, Crystal Tower, Main Street)
      
      DO NOT extract:
      - Furniture (table, chair, bed, sofa, desk)
      - Parts of rooms (corner, doorway, window, headboard, ceiling)
      - Spatial references (next to X, by the Y, near Z, under the table)
      - Temporary positions (where character is standing/sitting)
      
      Use consistent naming:
        * GOOD: "bedroom" (consistent across scenes)
        * BAD: "Sarah's bedroom" then "the bedroom" then "her room"
      
      CRITICAL INSTRUCTIONS FOR OBJECT EXTRACTION:
      DO NOT extract:
      - Body parts (hands, eyes, face, arms, legs, head, fingers, etc.)
      - Furniture (tables, chairs, beds, sofas - unless central to plot action)
      - Everyday items mentioned casually (phones, keys, cups, pens)
      - Parts of objects (door handle, table leg, window pane)
      - Natural features (trees, rocks, grass - unless named/magical)
      - Clothing items (unless explicitly given/taken/significant to plot)
      
      ONLY extract objects that are:
      - Weapons or tools actively used (guns, swords, knives, tools)
      - Magical/special items with powers (artifacts, enchanted items)
      - Plot devices (letters, maps, documents, keys to important places)
      - Items explicitly given/taken between characters
      - Objects mentioned 3+ times AND used in actions
      
      For "condition": ONLY factual physical condition (1-3 words)
        * GOOD: "damaged", "intact", "locked", "broken", "pristine"
        * BAD: "silent confirmation of a rendezvous" (interpretive)
      
      For "significance": ONLY factual role in scene (1 sentence max)
        * GOOD: "used by Rambo to call backup", "carried by Sarah"
        * BAD: "symbol of active planning and intention" (symbolic)
      
      EXTRACTION EXAMPLES:
      
      Scene: "Sarah drew her pistol and aimed at the door. Her hands trembled."
      
      CORRECT extraction:
      {{
        "objects": [
          {{
            "name": "pistol",
            "owner": "Sarah",
            "condition": null,
            "significance": "drawn and aimed at door"
          }}
        ]
      }}
      
      INCORRECT extraction (DO NOT DO THIS):
      {{
        "objects": [
          {{"name": "hands"}},  # ❌ Body part - never extract
          {{"name": "door"}},   # ❌ Part of room - not an object
          {{"condition": "trembling with fear"}}  # ❌ Interpretive - use factual only
        ]
      }}
      
      Return ONLY valid JSON in this exact format:
      {{
        "characters": [
          {{
            "name": "character name",
            "location": "room/building name or null",
            "emotional_state": "1-3 word state or null",
            "physical_condition": "1-3 word condition or null",
            "current_attire": "factual clothing description from text only, or null",
            "possessions_gained": ["item1", "item2"],
            "possessions_lost": ["item3"],
            "knowledge_gained": ["fact1", "fact2"],
            "relationship_changes": {{"other_char": "relationship description"}}
          }}
        ],
        "locations": [
          {{
            "name": "room/building/area name (consistent naming)",
            "condition": "1-3 word condition or null",
            "atmosphere": "1-5 word atmosphere or null",
            "occupants": ["character1", "character2"]
          }}
        ],
        "objects": [
          {{
            "name": "object name (weapons/artifacts/plot-items only)",
            "location": "where it is",
            "owner": "who has it or null",
            "condition": "1-3 word factual condition or null",
            "significance": "factual role in scene (1 sentence max) or null"
          }}
        ]
      }}
      
      If no changes for a category, use empty array. Return ONLY the JSON, no other text.

  # Batch/combined extraction (used by extraction_service.py and semantic_integration.py)
  batch:
    system: |
      You are an expert story analysis assistant. Analyze scenes and extract character moments, NPCs, plot events, and entity state changes. 
      Return only valid JSON with all four sections: character_moments, npcs, plot_events, and entity_states. 
      CRITICAL: Focus on quality over quantity - extract only truly significant items. Be selective and precise.
    
    user: |
      Analyze the following scenes and extract FOUR types of information in a single response:
      
      1. CHARACTER MOMENTS (for explicit characters only: {character_names})
      2. NPCs and ENTITIES (NOT in the explicit character list: {explicit_names})
      3. PLOT EVENTS (significant story events){thread_section}
      4. ENTITY STATE CHANGES (characters, locations, objects)
      
      Scenes:
      {batch_content}
      
      IMPORTANT: Extract only the MOST IMPORTANT/SIGNIFICANT items. Quality over quantity. Be highly selective.
      
      For CHARACTER MOMENTS:
      - Focus on explicit characters: {character_names}
      - Extract only significant moments (confidence >= 70)
      - Maximum 5 moments per character per scene
      - Moment types: "action", "dialogue", "development", "relationship"
      
      For NPCs:
      - Extract named entities NOT in explicit character list: {character_names}
      - Classify each as "CHARACTER" (sentient beings) or "ENTITY" (locations, objects, organizations)
      - Focus on entities with dialogue, actions, or relationships
      - Maximum 5 total NPCs across all scenes (reduced from {max_npcs_total} - only most significant)
      - Prioritize: has_dialogue OR has_actions OR mention_count >= 3
      
      For PLOT EVENTS:
      - Extract significant plot events only
      - Importance >= 70 AND confidence >= 80 (stricter thresholds)
      - Maximum 5 total events across all scenes (reduced from {max_events_total})
      - Event types: "introduction", "complication", "revelation", "resolution"
      
      For ENTITY STATE CHANGES:
      - Extract state changes for characters, locations, and objects
      - Focus on significant changes (location, emotional state, current attire, possessions, condition)
      - Maximum 8 total state changes across all scenes (reduced from 15 - prioritize most plot-critical)
      - Include only entities that have meaningful state changes
      
      CRITICAL INSTRUCTIONS FOR CHARACTER STATE EXTRACTION:
      All character descriptions MUST be:
      - FACTUAL: Only what is explicitly stated or directly observable
      - CONCISE: 1-5 words for states (e.g., "angry", "wounded", "exhausted")
      - OBJECTIVE: No interpretations, symbolism, or inferred meanings
      
      For "location": Use room/building names only
        * GOOD: "bedroom", "kitchen", "forest clearing"
        * BAD: "next to the bed", "by the window", "at the table"
      
      For "emotional_state": Single words or short phrases
        * GOOD: "angry", "sad", "determined", "confused"
        * BAD: "feeling complex emotions about recent events"
      
      For "physical_condition": Concise observable states
        * GOOD: "wounded", "exhausted", "healthy"
        * BAD: "appears to be in good health based on actions"
      
      For "current_attire": Extract ONLY what is explicitly mentioned
        * GOOD: "wearing torn red jacket", "shirtless", "in uniform"
        * BAD: "dressed in standard field gear" (if not stated)
        * Use null if no clothing is mentioned
      
      CRITICAL INSTRUCTIONS FOR LOCATION EXTRACTION:
      ONLY extract locations that are:
      - Rooms (bedroom, kitchen, living room, office, bathroom)
      - Buildings (house, castle, tower, shop, barn)
      - Outdoor areas (forest, courtyard, street, park, field)
      - Named places (Blackwood Manor, Crystal Tower, Main Street)
      
      DO NOT extract:
      - Furniture (table, chair, bed, sofa, desk)
      - Parts of rooms (corner, doorway, window, headboard, ceiling)
      - Spatial references (next to X, by the Y, near Z, under table)
      - Temporary positions (where character is standing/sitting)
      
      Use consistent naming across scenes:
        * GOOD: "bedroom" (same name every time)
        * BAD: "Sarah's bedroom" then "the bedroom" then "her room"
      
      CRITICAL INSTRUCTIONS FOR OBJECT EXTRACTION:
      DO NOT extract:
      - Body parts (hands, eyes, face, arms, legs, head, fingers, etc.) - NEVER extract these
      - Furniture (tables, chairs, beds, sofas - unless central to plot action)
      - Everyday items mentioned casually (phones, keys, cups, pens)
      - Parts of objects (door handle, table leg, window pane)
      - Natural features (trees, rocks, grass - unless named/magical)
      - Clothing items (unless explicitly given/taken/significant to plot)
      
      ONLY extract objects that are:
      - Weapons or tools actively used (guns, swords, knives, tools)
      - Magical/special items with powers (artifacts, enchanted items)
      - Plot devices (letters, maps, documents, keys to important places)
      - Items explicitly given/taken between characters
      - Objects mentioned 3+ times AND used in actions
      
      Maximum 3-5 objects total across all scenes (be highly selective - only most plot-critical)
      
      For "condition": ONLY factual physical condition (1-3 words)
        * GOOD: "damaged", "intact", "locked", "broken", "pristine"
        * BAD: "silent confirmation of a rendezvous" (interpretive)
      
      For "significance": ONLY factual role in scene (1 sentence max)
        * GOOD: "used by Rambo to call backup", "carried by Sarah"
        * BAD: "symbol of active planning and intention" (symbolic)
      
      EXTRACTION EXAMPLES:
      
      Scene: "Sarah drew her pistol and aimed at the door. Her hands trembled as she entered the bedroom."
      
      CORRECT extraction:
      {{
        "entity_states": {{
          "characters": [
            {{
              "name": "Sarah",
              "location": "bedroom",
