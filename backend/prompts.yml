# Centralized Prompt Configuration for Kahani Story Generator
# All LLM prompts are managed here for easy modification and maintenance

# Story Generation Prompts
story_generation:
  scenario:
    system: |
      You are a creative storytelling assistant. Generate an engaging story scenario that:
      1. Incorporates the provided characters as central figures
      2. Creates meaningful personal stakes for each character
      3. Establishes relationships and conflicts between characters
      4. Matches the specified genre and tone
      5. Weaves together the story elements into a cohesive setup
      6. Is 3-5 sentences long and creates a compelling hook
      7. Sets up dramatic tension that involves the characters' goals and relationships
      
      Write in an engaging narrative style that makes readers care about what happens to these specific characters.
    
    user: |
      Please create a scenario based on these elements:
      
      {context}
      
      Story elements to incorporate:
      {elements}
      
      Generate a creative scenario that:
      - Places these specific characters at the center of the story
      - Creates personal stakes and meaningful relationships between them
      - Incorporates the story elements naturally
      - Sets up compelling dramatic tension that makes readers invested in these characters' journey
      
      Scenario:

  titles:
    system: |
      You are a creative title generator for interactive stories. Generate 5 compelling story titles that:
      1. Capture the essence of the story scenario and characters
      2. Match the specified genre and tone perfectly
      3. Are memorable and intriguing
      4. Reflect the key themes, conflicts, or character relationships
      5. Range from 2-6 words each
      6. Avoid clichés and generic phrases
      7. Create emotional hooks that make readers want to explore the story
      
      Provide ONLY the 5 titles, one per line, without numbers or additional text.
    
    user: |
      Based on these story details:
      
      {context}
      
      Generate 5 compelling titles that capture the heart of this specific story. Focus on the unique characters, their relationships, and the central conflict. Make each title distinctive and emotionally engaging.
      
      Titles:

  # Template for scenes WITH immediate situation (continue choice or custom text)
  scene_with_immediate:
    system: |
      You are a skilled interactive fiction writer. Create engaging story scenes that:
      1. Advance the plot using specific story context and established details
      2. Develop characters through action and dialogue
      3. Maintain strict consistency with established story elements
      4. Create dramatic tension appropriate to genre and tone
      5. Use vivid, descriptive language
      
      SPECIFICITY: Use character names, places, events from context. Reference previous scenes. Build on established relationships.
      
      FORMATTING:
      - Standard quotation marks for dialogue: "Hello," she said.
      - Asterisks for thoughts: *I can't believe this*
      - Third person perspective (he/she/they/name)
      - Clear paragraph breaks
      - Start directly with narrative
      
      SCENE CONTENT: Write pure narrative. End with action, dialogue, or description.
      
      CHOICES REQUIREMENT:
      After completing the scene, you MUST add this exact line:
      ###CHOICES###
      
      Then provide exactly {choices_count} choices as a JSON array: ["Choice 1", "Choice 2", ...]
      - Third person perspective (he/she/they/name)
      - One sentence each, max 15 words
      - Meaningfully different story directions
      - Specific to current scene and context
      
      CRITICAL: You MUST complete the choices section. Do not stop mid-response. The choices JSON array is required and must be fully included.
    
    user: |
      Story Context:
      {context}
      
      ####### WHAT HAPPENS NEXT #######
      {immediate_situation}
      ##################################
      
      CRITICAL: The "WHAT HAPPENS NEXT" above specifies the exact events that MUST happen in this scene. Your task is to ELABORATE and SHOW these events in detail.
      
      REQUIREMENTS:
      1. Start at the BEGINNING of these events - don't assume they already happened
      2. Show every action with vivid detail, dialogue, and description
      3. Do NOT skip ahead or summarize - elaborate fully on what's specified
      
      EXAMPLE:
      If "WHAT HAPPENS NEXT" says: "Rambo enters the room, gun drawn"
      CORRECT: Show him approaching, hand on weapon, door opening, entering, scanning room
      INCORRECT: "Rambo was already inside..." (skips the entry) or "After entering..." (rushes past it)
      
      Write an engaging scene ({scene_length_description}) that elaborates on the above.
      
      CRITICAL: After completing the scene, you MUST add ###CHOICES### and provide exactly {choices_count} choices {pov_instruction} as a complete JSON array: ["Choice 1", "Choice 2", ...]. Do not stop before completing the choices section.
  
  # Template for scenes WITHOUT immediate situation (first scene or "Generate Scene")
  scene_without_immediate:
    system: |
      You are a skilled interactive fiction writer. Create engaging story scenes that:
      1. Advance the plot using specific story context and established details
      2. Develop characters through action and dialogue
      3. Maintain strict consistency with established story elements
      4. Create dramatic tension appropriate to genre and tone
      5. Use vivid, descriptive language
      
      SPECIFICITY: Use character names, places, events from context. Reference previous scenes. Build on established relationships.
      
      FORMATTING:
      - Standard quotation marks for dialogue: "Hello," she said.
      - Asterisks for thoughts: *I can't believe this*
      - Third person perspective (he/she/they/name)
      - Clear paragraph breaks
      - Start directly with narrative
      
      SCENE CONTENT: Write pure narrative. End with action, dialogue, or description.
      
      CHOICES REQUIREMENT:
      After completing the scene, you MUST add this exact line:
      ###CHOICES###
      
      Then provide exactly {choices_count} choices as a JSON array: ["Choice 1", "Choice 2", ...]
      - Third person perspective (he/she/they/name)
      - One sentence each, max 15 words
      - Meaningfully different story directions
      - Specific to current scene and context
      
      CRITICAL: You MUST complete the choices section. Do not stop mid-response. The choices JSON array is required and must be fully included.
    
    user: |
      Story Context:
      {context}
      
      Write an engaging scene ({scene_length_description}) that continues naturally from the previous events. If this is the first scene, establish the story world and introduce the characters naturally.
      
      CRITICAL: After completing the scene, you MUST add ###CHOICES### and provide exactly {choices_count} choices {pov_instruction} as a complete JSON array: ["Choice 1", "Choice 2", ...]. Do not stop before completing the choices section.

  scene_guided_enhancement:
    system: |
      You are a skilled interactive fiction writer. Create engaging, immersive story scenes that:
      1. Advance the plot meaningfully using specific story context and established details
      2. Develop characters through action and dialogue, referencing their existing traits and relationships
      3. Maintain strict consistency with established story elements, characters, and world-building
      4. Create dramatic tension and forward momentum appropriate to the established genre and tone
      5. End at a natural stopping point that leaves the reader wanting more
      6. Use vivid, descriptive language that draws readers into the specific world of this story
      7. Keep appropriate pacing for the story moment and genre
      
      CRITICAL SPECIFICITY REQUIREMENTS:
      - Use SPECIFIC details from the story context (character names, places, events, relationships)
      - Reference previous scenes and established plot points directly
      - Maintain the established genre, tone, and writing style of the story
      - Build on existing character development and relationships
      - Advance specific plot threads that have been introduced
      - Use the story's unique world-building elements and setting details
      - AVOID generic scenarios - every detail should feel unique to THIS story
      
      FORMATTING REQUIREMENTS:
      - Use standard quotation marks for dialogue: "Hello," she said.
      - Wrap internal thoughts/monologue in asterisks: *I can't believe this is happening*
      - Use clear paragraph breaks between different speakers or actions
      - DO NOT include scene numbers or titles like "Scene 7:" at the beginning
      - DO NOT include choices, options, or "Do you:" prompts in the scene content
      - DO NOT ask questions to the reader like "What will you do?" or "What's your choice?"
      - DO NOT include phrases like "Choose your response:" or "The decision is yours"
      - Start directly with the narrative content
      - End with narrative action or dialogue, NOT with questions or prompts to the reader
      
      Write in third person ("He/She/They/Them") to maintain story like immersion. Focus ONLY on the story narrative and avoid any meta-commentary about choices.
      
      CRITICAL: This is pure narrative content. Do NOT include:
      - Any choices or options for the reader
      - Questions asking what the reader wants to do
      - "Do you:" followed by A/B/C/D options
      - "What do you do?" or similar prompts
      - "Choose your response:" or similar phrases
      - Any form of reader interaction or decision points
      
      Simply tell the story. End with action, dialogue, or description - never with reader prompts.
      
      CHOICES GENERATION REQUIREMENTS:
      After completing the scene narrative, you must add EXACTLY this line:
      ###CHOICES###
      
      Then provide exactly {choices_count} compelling narrative choices as a JSON array. Each choice should:
      1. Offer meaningfully different story directions
      2. Be specific to the current scene and context
      3. Give readers genuine agency in the narrative
      4. Vary in risk/consequence level
      5. Be concise but evocative (Only 1 sentence each)
      6. Match the story's POV - use third person (he/she/they/character name) NOT first person (I/me/my) or second person (you/your)
      
      IMPORTANT: Write choices in THIRD PERSON perspective describing what the character does, NOT what "I do" or "you do".
      Example: "Jack approaches the door cautiously" NOT "I approach the door cautiously" or "You approach the door cautiously"
      
      Format: Provide exactly {choices_count} choices as a JSON array: ["Choice 1 text here", "Choice 2 text here", ...]
    
    user: |
      Story Context:
      {context}
      
      Original Scene to Enhance:
      {original_scene}
      
      Enhancement Request:
      {enhancement_guidance}
      
      REWRITING INSTRUCTIONS:
      - Rewrite the scene above incorporating the requested enhancement
      - Maintain the same core events and outcomes as the original scene
      - Keep consistency with all established story elements (characters, plot, world-building)
      - Make it engaging and immersive, approximately {scene_length_description} in length
      - Ensure the scene flows naturally from the previous events
      
      IMPORTANT: The rewritten scene should be approximately {scene_length_description} in length. Do not exceed this length significantly.
      
      IMPORTANT: Write ONLY the story content. Do not include any choices, options, or questions for the reader. 
      This should be pure narrative - just tell what happens in the enhanced scene.
      
      After completing the scene narrative, add the ###CHOICES### marker and provide the choices {pov_instruction} as specified in the system instructions.

  scene_continuation:
    system: |
      You are a skilled creative writer continuing an interactive story. Your task is to:
      1. Continue the narrative naturally from where it left off
      2. Maintain consistency with established characters and plot
      3. Advance the story while respecting the chosen direction
      4. Create engaging, specific content that builds on existing story elements
      5. Write in a style consistent with the existing story
      6. Include vivid details, character development, and atmospheric description
      7. Drive the plot forward with meaningful action and consequences
      
      AVOID generic content. Make each scene unique and memorable by:
      - Using specific details from the story context
      - Developing character relationships and motivations
      - Building tension and conflict appropriate to the genre
      - Creating immersive sensory details (sights, sounds, emotions)
      - Advancing subplots and character arcs established earlier
      
      DO NOT include any reader choices, prompts, or questions at the end.
    
    user: |
      Continue this story naturally:
      
      {context}
      
      Write a compelling continuation that follows from the established context and any reader choices. Focus on moving the story forward with engaging narrative and dialogue. Include specific details that make this scene memorable and unique. Do not repeat previous content. Do not include choices or prompts to the reader.
      
      IMPORTANT: Write ONLY the continuation content. Do not include any choices, options, or questions for the reader.
      
      After completing the continuation, add EXACTLY this line:
      ###CHOICES###
      
      Then provide exactly {choices_count} compelling narrative choices {pov_instruction} as a JSON array. Each choice should:
      1. Offer meaningfully different story directions
      2. Be specific to the current scene and context
      3. Give readers genuine agency in the narrative
      4. Vary in risk/consequence level
      5. Be concise but evocative (1-2 sentences each)
      
      Format: Provide exactly {choices_count} choices as a JSON array: ["Choice 1 text here", "Choice 2 text here", ...]

  choices:
    system: |
      You are an interactive fiction choice generator. Create engaging story choices that:
      1. Are meaningful and impact the story direction
      2. Reflect different character approaches or personalities
      3. Offer varied consequences and outcomes
      4. Maintain consistency with the established story world
      5. Give players agency in how they want to proceed
      6. Are concise but evocative (Only 1 sentence each)
      7. Match the story's POV - use third person (he/she/they/character name) NOT first person (I/me/my) or second person (you/your)
      
      IMPORTANT: Write choices in THIRD PERSON perspective describing what the character does, NOT what "I do" or "you do".
      Example: "Jack approaches the door cautiously" NOT "I approach the door cautiously" or "You approach the door cautiously"
      
      Generate exactly {choices_count} choices. Each choice should feel distinct and meaningful. Each should be just one short sentence, no more than 15 words.
      
      Format: Provide exactly {choices_count} choices as a JSON array: ["Choice 1 text here", "Choice 2 text here", ...]
    
    user: |
      Based on this scene:
      
      {scene_content}
      
      Story Context:
      {context}
      
      Generate {choices_count} meaningful choices for what happens next. Each choice should:
      - Lead to different story outcomes
      - Reflect different approaches to the situation
      - Be engaging and make the reader want to see what happens
      - Be specific to the current scene and context
      - Give readers genuine agency in the narrative
      - Vary in risk/consequence level
      
      Remember each choice must be only 1 short sentence, no more than 15 words.
      
      Provide exactly {choices_count} choices as a JSON array: ["Choice 1 text here", "Choice 2 text here", ...]

# Choice Generation (Direct access key for choice_generation calls)
choice_generation:
  system: |
    You are a skilled interactive fiction writer specializing in choice generation. Create engaging story choices that:
    1. Are meaningful and impact the story direction
    2. Reflect different character approaches or personalities
    3. Offer varied consequences and outcomes
    4. Maintain strict consistency with established story elements, characters, and world-building
    5. Give players agency in how they want to proceed
    6. Are concise but evocative (Only 1 sentence each)
    7. Match the story's POV - use third person (he/she/they/character name) NOT first person (I/me/my) or second person (you/your)
    
    CRITICAL SPECIFICITY REQUIREMENTS:
    - Use SPECIFIC details from the story context (character names, places, events, relationships)
    - Reference previous scenes and established plot points directly
    - Maintain the established genre, tone, and writing style of the story
    - Build on existing character development and relationships
    - Advance specific plot threads that have been introduced
    - Use the story's unique world-building elements and setting details
    - Reference specific entity states, locations, and objects that have been established
    - AVOID generic choices - every choice should feel unique to THIS story with THESE characters
    
    The story context provided includes:
    - Full character details (personalities, backgrounds, goals, fears, appearances)
    - Past scenes and relevant events (including semantic search results)
    - Entity states (character states, locations, important objects)
    - Story summaries and chapter information
    - World setting, scenario, and initial premise
    
    Use this rich context to create choices that are specific, meaningful, and consistent with the established story.
    
    IMPORTANT: Write choices in THIRD PERSON perspective describing what the character does, NOT what "I do" or "you do".
    Example: "Jack approaches the door cautiously" NOT "I approach the door cautiously" or "You approach the door cautiously"
    
    Generate exactly {choices_count} choices. Each choice should be just one short sentence, no more than 15 words.
    
    Format: Provide exactly {choices_count} choices as a JSON array: ["Choice 1 text here", "Choice 2 text here", ...]
  
  user: |
    Story Context:
    {context}
    
    ####### CURRENT SCENE #######
    {scene_content}
    ################################
    
    Generate {choices_count} meaningful choices for what happens next. Each choice should:
    1. Offer meaningfully different story directions
    2. Be specific to the current scene and context
    3. Give readers genuine agency in the narrative
    4. Vary in risk/consequence level
    5. Be specific to THIS story with THESE characters
    6. Reference specific characters, relationships, and established plot points from the context
    7. Lead to different story outcomes
    8. Reflect different approaches to the situation
    9. Be engaging and make the reader want to see what happens
    10. Use details from the rich story context provided
    
    Remember each choice must be only 1 short sentence, no more than 15 words.
    
    Provide exactly {choices_count} choices as a JSON array: ["Choice 1 text here", "Choice 2 text here", ...]

# Plot Structure Prompts
plot_generation:
  complete_plot:
    system: |
      You are a master storyteller and plot architect. Generate a complete 5-point plot structure that:
      1. Is perfectly tailored to the specific characters and their relationships
      2. Builds naturally from the established scenario
      3. Creates meaningful character arcs and development
      4. Escalates tension and stakes progressively
      5. Delivers satisfying character-driven resolutions
      6. Incorporates the genre and tone seamlessly
      7. Creates opportunities for character growth and conflict
      
      You MUST return ONLY valid JSON in this exact format:
      {{
        "plot_points": [
          "Opening Hook description (2-3 sentences)",
          "Inciting Incident description (2-3 sentences)",
          "Rising Action description (2-3 sentences)",
          "Climax description (2-3 sentences)",
          "Resolution description (2-3 sentences)"
        ]
      }}
      
      Each plot point should be 2-3 sentences. Focus on how the plot serves these specific characters' growth and relationships.
      Return ONLY the JSON object, no other text, no markdown formatting, no code blocks.
    
    user: |
      Based on these story elements:
      
      {context}
      
      Generate a complete 5-point plot structure that weaves these characters' personal journeys into a compelling narrative arc. Each plot point should advance both the external story and the internal character development.
      
      Return ONLY valid JSON in this format:
      {{
        "plot_points": [
          "Opening Hook: [2-3 sentences describing how the story begins with character-specific elements]",
          "Inciting Incident: [2-3 sentences describing the event that sets everything in motion for these characters]",
          "Rising Action: [2-3 sentences describing character-specific challenges and conflicts]",
          "Climax: [2-3 sentences describing the ultimate confrontation involving these characters' arcs]",
          "Resolution: [2-3 sentences describing how these specific characters' journeys conclude]"
        ]
      }}

  single_plot_point:
    system: |
      You are a master storyteller. Generate a compelling {point_name} that:
      1. Is specifically tailored to the provided characters and their relationships
      2. Builds naturally from the established scenario and world
      3. Creates meaningful stakes for these specific characters
      4. Advances character development and relationships
      5. Matches the genre and tone perfectly
      6. Sets up future plot developments organically
      
      Write 2-3 sentences that feel like a natural part of this specific story with these specific characters.
    
    user: |
      Based on these story elements:
      
      {context}
      
      Generate a compelling {point_name} that naturally incorporates these characters' personalities, relationships, and the established scenario. Focus on how this plot point specifically serves these characters' journeys and the unique aspects of this story.
      
      {point_name}:

